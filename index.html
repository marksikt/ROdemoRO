  function b64ToBlob(b64){
    var bin=atob(b64),bytes=new Uint8Array(bin.length);
    for(var i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
    return URL.createObjectURL(new Blob([bytes],{type:'text/html;charset=utf-8'}));
  }

  var frLeft = document.getElementById('fr-left');
  var frMid  = document.getElementById('fr-mid');
  var frArch = document.getElementById('fr-arch');
  var midLbl = document.getElementById('mid-lbl');

  frLeft.src = b64ToBlob(leftB64);
  frMid.src  = b64ToBlob(midB64);
  frArch.src = b64ToBlob(archB64);

  // Relay messages between iframes
  window.addEventListener('message', function(e){
    var d = e.data;
    if (!d || !d.type) return;

    if (d.type === 'sel') {
      // Left → Middle: person selected
      frMid.contentWindow.postMessage(d, '*');
      midLbl.textContent = 'Fișă cetățean · situații de viață disponibile';
    }
    if (d.type === 'reset') {
      // Left → Middle: state reset
      frMid.contentWindow.postMessage(d, '*');
      midLbl.textContent = 'Ecosistem · instituții · concepte';
    }
    if (d.type === 'stateUpdate') {
      // Middle → Left: agent updated state
      frLeft.contentWindow.postMessage(d, '*');
    }
  });
})();
</script>
